<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>下载记录</title>
  <script src="jszip.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f6fa;
      color: #333;
      padding: 32px 16px;
    }

    h1 { font-size: 20px; font-weight: 600; margin-bottom: 20px; color: #111; }

    .record-list { display: flex; flex-direction: column; gap: 12px; max-width: 720px; }

    .record-card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
    }

    .record-main {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
    }

    .record-info { display: flex; flex-direction: column; gap: 4px; }
    .record-name { font-size: 15px; font-weight: 500; }
    .record-meta { font-size: 12px; color: #888; }

    .files-toggle {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 12px;
      background: #f0f4ff; color: #3b5bdb;
      border: 1px solid #c5d0ff; border-radius: 6px;
      font-size: 13px; font-weight: 500;
      cursor: pointer; transition: background .15s; white-space: nowrap;
    }
    .files-toggle:hover { background: #e0e9ff; }
    .files-toggle .arrow { font-size: 10px; transition: transform .2s; }
    .files-toggle.open .arrow { transform: rotate(180deg); }

    .files-panel { display: none; border-top: 1px solid #e5e7eb; }
    .files-panel.open { display: block; }

    /* 文件行 */
    .file-row {
      border-bottom: 1px solid #f0f1f5;
    }
    .file-row:last-child { border-bottom: none; }

    .file-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 18px;
      background: #fafbff;
      font-size: 13px;
    }

    .file-icon { font-size: 16px; width: 20px; text-align: center; flex-shrink: 0; }
    .file-name { flex: 1; color: #222; }
    .file-size { color: #aaa; font-size: 12px; margin-right: 8px; }

    .btn {
      padding: 4px 10px; border-radius: 5px;
      font-size: 12px; font-weight: 500;
      cursor: pointer; border: 1px solid;
      transition: background .15s, opacity .15s;
      white-space: nowrap;
    }
    .btn:disabled { opacity: .5; cursor: default; }

    .btn-extract { color: #d97706; background: #fffbeb; border-color: #fcd34d; }
    .btn-extract:hover:not(:disabled) { background: #fef3c7; }

    .btn-run { color: #16a34a; background: #f0fdf4; border-color: #86efac; }
    .btn-run:hover:not(:disabled) { background: #dcfce7; }

    /* 解压进度 */
    .progress-row {
      display: none;
      align-items: center; gap: 10px;
      padding: 8px 18px;
      background: #f9fafb;
      border-bottom: 1px solid #f0f1f5;
      font-size: 12px; color: #6b7280;
    }
    .progress-row.show { display: flex; }
    .progress-bar-wrap { flex: 1; height: 4px; background: #e5e7eb; border-radius: 99px; overflow: hidden; }
    .progress-bar { height: 100%; background: #3b5bdb; border-radius: 99px; width: 0%; transition: width .1s linear; }

    /* 解压文件树 */
    .tree-row {
      display: none;
      padding: 10px 18px;
      background: #f0f4ff;
      border-bottom: 1px solid #e0e7ff;
    }
    .tree-row.show { display: block; }
    .tree-title {
      font-size: 11px; color: #6b7280; margin-bottom: 8px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .tree-files { display: flex; flex-direction: column; gap: 3px; margin-bottom: 10px; }
    .tree-file {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; color: #374151;
      padding: 3px 6px; border-radius: 4px;
      cursor: pointer; transition: background .12s;
    }
    .tree-file:hover { background: #dbe4ff; }
    .tree-file .tf-icon { font-size: 13px; }
    .tree-file .tf-name { flex: 1; }
    .tree-file .tf-size { font-size: 11px; color: #9ca3af; }

    /* 运行预览 iframe */
    .preview-row {
      display: none;
      border-top: 1px solid #e5e7eb;
    }
    .preview-row.show { display: block; }
    .preview-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 14px;
      background: #1e1e2e;
      font-size: 12px; color: #cdd6f4;
      font-family: monospace;
    }
    .preview-close {
      cursor: pointer; color: #f38ba8; font-size: 14px;
      background: none; border: none; padding: 0 4px;
    }
    .preview-iframe {
      width: 100%; border: none;
      background: #fff;
      display: block;
    }
  </style>
</head>
<body>

<h1>下载记录</h1>
<div class="record-list" id="recordList"></div>

<script>
const records = [
  {
    name: "2024年第三季度财务报告",
    date: "2025-06-03 14:22",
    files: [
      { name: "财务摘要.pdf",  size: "1.2 MB", icon: "📄", type: "pdf" },
      { name: "详细数据.xlsx", size: "3.8 MB", icon: "📊", type: "xlsx" },
      { name: "附件说明.docx", size: "256 KB", icon: "📝", type: "docx" },
    ]
  },
  {
    name: "产品设计资源包",
    date: "2025-06-02 09:47",
    files: [
      { name: "UI组件.zip",   size: "3.1 KB",  icon: "🗜️", type: "zip", src: "packages/UI组件.zip",   entry: "index.html" },
      { name: "图标集.zip",   size: "6.7 KB",  icon: "🗜️", type: "zip", src: "packages/图标集.zip",   entry: "preview.html" },
      { name: "字体文件.zip", size: "1.8 KB",  icon: "🗜️", type: "zip", src: "packages/字体文件.zip", entry: "index.html" },
    ]
  },
  {
    name: "技术文档合集",
    date: "2025-06-01 16:05",
    files: [
      { name: "API参考手册.pdf", size: "5.6 MB", icon: "📄", type: "pdf" },
      { name: "架构图.png",      size: "890 KB", icon: "🖼️", type: "png" },
      { name: "变更日志.md",     size: "48 KB",  icon: "📝", type: "md" },
    ]
  }
];

function fileIcon(name) {
  if (/\.html?$/i.test(name)) return "🌐";
  if (/\.svg$/i.test(name))   return "🎨";
  if (/\.md$/i.test(name))    return "📝";
  if (/\.txt$/i.test(name))   return "📄";
  if (/\.(ttf|woff2?)$/i.test(name)) return "🔤";
  if (/\.(png|jpe?g|gif|webp)$/i.test(name)) return "🖼️";
  if (/\/$/.test(name))       return "📁";
  return "📄";
}

function fmtSize(bytes) {
  if (bytes < 1024) return bytes + " B";
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + " KB";
  return (bytes/1024/1024).toFixed(1) + " MB";
}

const list = document.getElementById('recordList');

records.forEach((record, ri) => {
  const card = document.createElement('div');
  card.className = 'record-card';

  const filesHTML = record.files.map((f, fi) => {
    const isZip = f.type === 'zip';
    const actionBtn = isZip
      ? `<button class="btn btn-extract" data-ri="${ri}" data-fi="${fi}">解压</button>`
      : `<span style="font-size:12px;color:#ccc">—</span>`;

    return `
      <div class="file-row" id="row-${ri}-${fi}">
        <div class="file-item">
          <span class="file-icon">${f.icon}</span>
          <span class="file-name">${f.name}</span>
          <span class="file-size">${f.size}</span>
          ${actionBtn}
        </div>
        ${isZip ? `
          <div class="progress-row" id="pr-${ri}-${fi}">
            <span>正在解压...</span>
            <div class="progress-bar-wrap"><div class="progress-bar" id="pb-${ri}-${fi}"></div></div>
            <span id="pct-${ri}-${fi}">0%</span>
          </div>
          <div class="tree-row" id="tr-${ri}-${fi}">
            <div class="tree-title">
              <span>📦 已解压文件</span>
              <button class="btn btn-run" data-ri="${ri}" data-fi="${fi}">▶ 运行</button>
            </div>
            <div class="tree-files" id="tf-${ri}-${fi}"></div>
          </div>
          <div class="preview-row" id="pv-${ri}-${fi}">
            <div class="preview-header">
              <span id="pvtitle-${ri}-${fi}">运行中...</span>
              <button class="preview-close" data-ri="${ri}" data-fi="${fi}">✕ 关闭</button>
            </div>
            <iframe class="preview-iframe" id="iframe-${ri}-${fi}" height="420"></iframe>
          </div>
        ` : ''}
      </div>
    `;
  }).join('');

  card.innerHTML = `
    <div class="record-main">
      <div class="record-info">
        <span class="record-name">${record.name}</span>
        <span class="record-meta">${record.date}</span>
      </div>
      <button class="files-toggle" data-ri="${ri}">
        Files (${record.files.length}) <span class="arrow">▼</span>
      </button>
    </div>
    <div class="files-panel" id="fp-${ri}">${filesHTML}</div>
  `;

  list.appendChild(card);
});

// 事件委托
list.addEventListener('click', async e => {
  // 展开/收起
  const toggle = e.target.closest('.files-toggle');
  if (toggle) {
    const ri = toggle.dataset.ri;
    const panel = document.getElementById(`fp-${ri}`);
    const open = panel.classList.toggle('open');
    toggle.classList.toggle('open', open);
    return;
  }

  // 解压
  const extractBtn = e.target.closest('.btn-extract');
  if (extractBtn) {
    await doExtract(extractBtn.dataset.ri, extractBtn.dataset.fi, extractBtn);
    return;
  }

  // 运行
  const runBtn = e.target.closest('.btn-run');
  if (runBtn) {
    doRun(runBtn.dataset.ri, runBtn.dataset.fi, runBtn);
    return;
  }

  // 关闭预览
  const closeBtn = e.target.closest('.preview-close');
  if (closeBtn) {
    const { ri, fi } = closeBtn.dataset;
    document.getElementById(`pv-${ri}-${fi}`).classList.remove('show');
    document.getElementById(`iframe-${ri}-${fi}`).src = '';
    return;
  }

  // 点击文件树中的文件 → 在 iframe 里展示
  const treeFile = e.target.closest('.tree-file');
  if (treeFile) {
    const { ri, fi, fname } = treeFile.dataset;
    const zip = window._zips?.[`${ri}-${fi}`];
    if (!zip) return;
    await openFileInIframe(ri, fi, zip, fname);
  }
});

// 已解压 zip 缓存
window._zips = {};

async function doExtract(ri, fi, btn) {
  btn.disabled = true;
  btn.textContent = '解压中…';

  const f = records[ri].files[fi];
  const pr = document.getElementById(`pr-${ri}-${fi}`);
  const pb = document.getElementById(`pb-${ri}-${fi}`);
  const pct = document.getElementById(`pct-${ri}-${fi}`);
  pr.classList.add('show');

  // 动画进度
  let prog = 0;
  const iv = setInterval(() => {
    prog = Math.min(prog + Math.random() * 15 + 5, 90);
    pb.style.width = prog + '%';
    pct.textContent = Math.floor(prog) + '%';
  }, 80);

  try {
    const resp = await fetch(f.src);
    const buf  = await resp.arrayBuffer();
    const zip  = await JSZip.loadAsync(buf);
    window._zips[`${ri}-${fi}`] = zip;

    clearInterval(iv);
    pb.style.width = '100%';
    pct.textContent = '100%';

    setTimeout(() => {
      pr.classList.remove('show');

      // 填充文件树
      const container = document.getElementById(`tf-${ri}-${fi}`);
      const entries = Object.keys(zip.files).sort();
      container.innerHTML = entries.map(name => {
        const file = zip.files[name];
        const size = file._data ? fmtSize(file._data.uncompressedSize || 0) : '';
        return `
          <div class="tree-file" data-ri="${ri}" data-fi="${fi}" data-fname="${name}">
            <span class="tf-icon">${fileIcon(name)}</span>
            <span class="tf-name">${name}</span>
            <span class="tf-size">${file.dir ? '' : size}</span>
          </div>`;
      }).join('');

      document.getElementById(`tr-${ri}-${fi}`).classList.add('show');
      btn.textContent = '✓ 已解压';
    }, 200);
  } catch (err) {
    clearInterval(iv);
    pr.classList.remove('show');
    btn.disabled = false;
    btn.textContent = '重试';
    alert('解压失败: ' + err.message);
  }
}

async function doRun(ri, fi, btn) {
  const f = records[ri].files[fi];
  const zip = window._zips[`${ri}-${fi}`];
  if (!zip) return;
  btn.disabled = true;
  btn.textContent = '运行中…';
  await openFileInIframe(ri, fi, zip, f.entry);
  setTimeout(() => { btn.disabled = false; btn.textContent = '▶ 运行'; }, 1000);
}

async function openFileInIframe(ri, fi, zip, entryName) {
  const pv     = document.getElementById(`pv-${ri}-${fi}`);
  const iframe = document.getElementById(`iframe-${ri}-${fi}`);
  const title  = document.getElementById(`pvtitle-${ri}-${fi}`);

  title.textContent = '⚙ 加载中...';
  pv.classList.add('show');
  iframe.src = '';

  try {
    // 把 zip 内所有文件转成 blob URL，构造完整 HTML
    const urls = {};
    for (const [name, file] of Object.entries(zip.files)) {
      if (!file.dir) {
        const blob = await file.async('blob');
        urls[name] = URL.createObjectURL(blob);
      }
    }

    // 读取入口 HTML，替换相对路径引用
    let html = await zip.files[entryName].async('string');
    // 替换 src="xxx" href="xxx" url(xxx) 中的相对路径
    for (const [name, burl] of Object.entries(urls)) {
      // escape for regex
      const escaped = name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      html = html.replace(new RegExp(`(['"])${escaped}\\1`, 'g'), `$1${burl}$1`);
      html = html.replace(new RegExp(`url\\(${escaped}\\)`, 'g'), `url(${burl})`);
    }

    const blob = new Blob([html], { type: 'text/html' });
    iframe.src = URL.createObjectURL(blob);
    title.textContent = `▶ ${entryName}`;
  } catch(err) {
    title.textContent = '❌ 加载失败';
    console.error(err);
  }
}
</script>
</body>
</html>
