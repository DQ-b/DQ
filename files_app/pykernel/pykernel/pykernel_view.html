<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PyKernel 运行视图</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f4ef;
      --ink: #1f2428;
      --muted: #69727d;
      --line: #d8d2c6;
      --panel: #ffffff;
      --panel-soft: #fbfaf7;
      --shadow: 0 18px 40px rgba(45, 42, 36, 0.10);
      --hello: #2f7ab8;
      --memory: #6f7f2a;
      --sleeper: #7b5aa6;
      --producer: #c65f2e;
      --consumer: #18836f;
      --forker: #b57621;
      --child: #d35c7f;
      --ok: #16805d;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.68), rgba(246, 244, 239, 0.92)),
        var(--bg);
      color: var(--ink);
      font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      font-size: 15px;
    }

    .app {
      width: min(1400px, calc(100% - 40px));
      margin: 0 auto;
      padding: 28px 0 34px;
    }

    header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: end;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--line);
    }

    h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 760;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      line-height: 1.55;
    }

    .segmented {
      display: inline-grid;
      grid-template-columns: repeat(3, minmax(82px, 1fr));
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--line);
      background: #eee8dc;
      border-radius: 8px;
    }

    .segmented button {
      appearance: none;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font: inherit;
      font-size: 13px;
      min-height: 34px;
      padding: 0 10px;
      white-space: nowrap;
    }

    .segmented button.active {
      color: var(--ink);
      background: #ffffff;
      box-shadow: 0 2px 9px rgba(42, 38, 32, 0.10);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin: 18px 0;
    }

    .stat {
      min-height: 88px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 8px 24px rgba(45, 42, 36, 0.06);
    }

    .stat .label {
      color: var(--muted);
      font-size: 13px;
    }

    .stat .value {
      margin-top: 8px;
      font-size: 27px;
      font-weight: 760;
      line-height: 1;
    }

    .stat .note {
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .mode-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      align-items: start;
    }

    .mode-panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .mode-panel[hidden] {
      display: none;
    }

    .mode-head {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      background: var(--panel-soft);
    }

    .mode-title {
      margin: 0;
      font-size: 19px;
      font-weight: 750;
      letter-spacing: 0;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 10px;
      border-radius: 7px;
      background: #e8f4ee;
      color: var(--ok);
      font-size: 12px;
      font-weight: 700;
    }

    .mode-body {
      padding: 18px;
    }

    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      margin: 0 0 10px;
      font-size: 14px;
      font-weight: 740;
    }

    .section-title span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
    }

    .timeline {
      position: relative;
      min-height: 386px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        repeating-linear-gradient(
          90deg,
          rgba(31, 36, 40, 0.07) 0,
          rgba(31, 36, 40, 0.07) 1px,
          transparent 1px,
          transparent calc(100% / 6)
        ),
        #fffdf8;
      padding: 18px 12px 18px 92px;
      overflow: hidden;
    }

    .axis {
      position: absolute;
      left: 92px;
      right: 12px;
      bottom: 10px;
      height: 18px;
      color: var(--muted);
      font-size: 11px;
    }

    .axis span {
      position: absolute;
      bottom: 0;
      transform: translateX(-50%);
      white-space: nowrap;
    }

    .lane {
      position: relative;
      height: 38px;
      margin-bottom: 9px;
      border-bottom: 1px solid rgba(216, 210, 198, 0.68);
    }

    .lane-label {
      position: absolute;
      left: -80px;
      top: 8px;
      width: 70px;
      overflow: hidden;
      color: var(--muted);
      font-size: 12px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .bar {
      position: absolute;
      top: 7px;
      height: 22px;
      min-width: 4px;
      border-radius: 6px;
      box-shadow: inset 0 -8px 14px rgba(0, 0, 0, 0.12);
    }

    .bar.hello { background: var(--hello); }
    .bar.memory { background: var(--memory); }
    .bar.sleeper { background: var(--sleeper); }
    .bar.producer { background: var(--producer); }
    .bar.consumer { background: var(--consumer); }
    .bar.forker { background: var(--forker); }
    .bar.forker-child { background: var(--child); }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
      margin: 12px 0 18px;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: var(--muted);
      font-size: 12px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 3px;
      background: currentColor;
    }

    .dot.hello { color: var(--hello); }
    .dot.memory { color: var(--memory); }
    .dot.sleeper { color: var(--sleeper); }
    .dot.producer { color: var(--producer); }
    .dot.consumer { color: var(--consumer); }
    .dot.forker { color: var(--forker); }
    .dot.forker-child { color: var(--child); }

    .events {
      display: grid;
      gap: 8px;
      max-height: 304px;
      overflow: auto;
      padding-right: 4px;
    }

    .event {
      display: grid;
      grid-template-columns: 48px 1fr;
      gap: 10px;
      align-items: start;
      padding: 10px 11px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
    }

    .tick {
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      font-size: 12px;
      padding-top: 1px;
    }

    .event strong {
      display: block;
      margin-bottom: 2px;
      font-size: 13px;
    }

    .event p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.42;
    }

    .summary {
      margin-top: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 10px 26px rgba(45, 42, 36, 0.07);
      overflow: hidden;
    }

    .summary-head {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 15px 18px;
      border-bottom: 1px solid var(--line);
      background: var(--panel-soft);
    }

    .summary-head h2 {
      margin: 0;
      font-size: 18px;
      font-weight: 750;
      letter-spacing: 0;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    th,
    td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: middle;
    }

    th {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      background: #fffdf8;
    }

    td {
      font-size: 13px;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .pid {
      width: 58px;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    .status {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 0 9px;
      border-radius: 7px;
      background: #edf7f2;
      color: var(--ok);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .cpu-cell {
      min-width: 140px;
    }

    .cpu-bar {
      height: 8px;
      width: 100%;
      margin-top: 7px;
      border-radius: 4px;
      background: #ede7dd;
      overflow: hidden;
    }

    .cpu-fill {
      height: 100%;
      border-radius: 4px;
      background: linear-gradient(90deg, #2f7ab8, #18836f, #c65f2e);
    }

    .raw {
      margin-top: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #1f2428;
      color: #f7f3ea;
      overflow: hidden;
    }

    .raw summary {
      cursor: pointer;
      padding: 13px 16px;
      color: #f7f3ea;
      font-weight: 700;
    }

    pre {
      margin: 0;
      max-height: 360px;
      overflow: auto;
      padding: 0 16px 16px;
      color: #f7f3ea;
      font-family: Consolas, "Cascadia Mono", monospace;
      font-size: 12px;
      line-height: 1.46;
      white-space: pre-wrap;
    }

    @media (max-width: 980px) {
      .app {
        width: min(100% - 24px, 740px);
        padding-top: 18px;
      }

      header,
      .mode-grid,
      .stats {
        grid-template-columns: 1fr;
      }

      .segmented {
        width: 100%;
      }

      .timeline {
        padding-left: 78px;
      }

      .axis {
        left: 78px;
      }

      .lane-label {
        left: -68px;
        width: 58px;
      }

      th:nth-child(4),
      td:nth-child(4) {
        display: none;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div>
        <h1>PyKernel 运行视图</h1>
        <p class="subtitle">两种调度策略的实际运行结果已经整理到同一个页面。</p>
      </div>
      <nav class="segmented" aria-label="视图切换">
        <button class="active" type="button" data-view="both">并排</button>
        <button type="button" data-view="roundrobin">轮转</button>
        <button type="button" data-view="priority">优先级</button>
      </nav>
    </header>

    <section class="stats" aria-label="总体状态">
      <div class="stat">
        <div class="label">运行时长</div>
        <div class="value">61 ticks</div>
        <div class="note">两种策略都在同一 tick 结束</div>
      </div>
      <div class="stat">
        <div class="label">进程数量</div>
        <div class="value">7</div>
        <div class="note">包含 fork 生成的子进程</div>
      </div>
      <div class="stat">
        <div class="label">退出状态</div>
        <div class="value">0</div>
        <div class="note">全部进程正常退出</div>
      </div>
      <div class="stat">
        <div class="label">物理内存</div>
        <div class="value">64/64</div>
        <div class="note">所有帧已经释放</div>
      </div>
    </section>

    <section class="mode-grid" id="modeGrid" aria-label="调度策略对比"></section>

    <section class="summary" aria-label="进程汇总">
      <div class="summary-head">
        <h2>进程汇总</h2>
        <span class="badge">全部正常</span>
      </div>
      <table>
        <thead>
          <tr>
            <th class="pid">PID</th>
            <th>进程</th>
            <th>状态</th>
            <th>退出码</th>
            <th class="cpu-cell">CPU ticks</th>
          </tr>
        </thead>
        <tbody id="summaryRows"></tbody>
      </table>
    </section>

    <details class="raw">
      <summary>原始终端输出</summary>
      <pre id="rawOutput"></pre>
    </details>
  </main>

  <script>
    const processRows = [
      { pid: 1, name: "hello", state: "TERMINATED", exit: 0, cpu: 9, cls: "hello" },
      { pid: 2, name: "memory", state: "TERMINATED", exit: 0, cpu: 10, cls: "memory" },
      { pid: 3, name: "sleeper", state: "TERMINATED", exit: 0, cpu: 4, cls: "sleeper" },
      { pid: 4, name: "producer", state: "TERMINATED", exit: 0, cpu: 11, cls: "producer" },
      { pid: 5, name: "consumer", state: "TERMINATED", exit: 0, cpu: 13, cls: "consumer" },
      { pid: 6, name: "forker", state: "TERMINATED", exit: 0, cpu: 5, cls: "forker" },
      { pid: 7, name: "forker-child", state: "TERMINATED", exit: 0, cpu: 9, cls: "forker-child" }
    ];

    const runs = {
      roundrobin: {
        title: "Round-robin",
        subtitle: "公平轮转，多个进程交替推进",
        dispatches: [
          [0, 1], [4, 2], [14, 3], [16, 4], [19, 5], [22, 6],
          [27, 1], [29, 4], [32, 3], [34, 7], [38, 1], [40, 5],
          [41, 4], [44, 7], [46, 1], [47, 5], [52, 4], [54, 7],
          [56, 5], [57, 7], [58, 5]
        ],
        events: [
          [0, "hello", "hello 先拿到 CPU，开始输出工作步骤"],
          [4, "memory", "memory 连续写入 4 个页面，然后释放内存"],
          [16, "producer", "producer 发送第一个 work-queue 消息"],
          [21, "consumer", "consumer 消费 item-0，随后等待新消息"],
          [25, "forker", "forker 创建 forker-child"],
          [32, "sleeper", "sleeper 睡眠结束后继续运行"],
          [47, "consumer", "consumer 连续消费 item-1 和 item-2"],
          [61, "shutdown", "所有进程结束，物理帧恢复 64/64"]
        ]
      },
      priority: {
        title: "Priority",
        subtitle: "高优先级的 producer 和 consumer 先完成",
        dispatches: [
          [0, 4], [3, 5], [6, 4], [9, 5], [10, 4], [13, 5],
          [18, 4], [20, 5], [21, 5], [24, 2], [34, 1], [38, 3],
          [40, 6], [45, 1], [47, 7], [51, 3], [53, 1], [55, 7],
          [57, 1], [58, 7], [60, 7]
        ],
        events: [
          [0, "producer", "producer 因优先级更高先开始生产"],
          [3, "consumer", "consumer 立刻消费 item-0"],
          [13, "consumer", "consumer 消费 item-1 和 item-2"],
          [24, "memory", "高优先级任务完成后，memory 开始运行"],
          [34, "hello", "hello 进入执行序列"],
          [40, "forker", "forker 创建 forker-child"],
          [51, "sleeper", "sleeper 被唤醒并退出"],
          [61, "shutdown", "所有进程结束，物理帧恢复 64/64"]
        ]
      }
    };

    const rawOutput = `ROUND-ROBIN
[tick   0] dispatch -> <Process 1:hello RUNNING>
[tick   4] dispatch -> <Process 2:memory RUNNING>
[tick  14] dispatch -> <Process 3:sleeper RUNNING>
[tick  16] dispatch -> <Process 4:producer RUNNING>
[tick  19] dispatch -> <Process 5:consumer RUNNING>
[tick  22] dispatch -> <Process 6:forker RUNNING>
[tick  25] spawned <Process 7:forker-child READY>
[tick  47] <Process 1:hello ZOMBIE> exited code=0
[tick  61] main loop exited

PRIORITY
[tick   0] dispatch -> <Process 4:producer RUNNING>
[tick   3] dispatch -> <Process 5:consumer RUNNING>
[tick  20] <Process 4:producer ZOMBIE> exited code=0
[tick  24] dispatch -> <Process 2:memory RUNNING>
[tick  34] dispatch -> <Process 1:hello RUNNING>
[tick  40] dispatch -> <Process 6:forker RUNNING>
[tick  43] spawned <Process 7:forker-child READY>
[tick  61] main loop exited

SHUTDOWN
pid  1 hello          state=TERMINATED  exit=0 cpu_ticks=9
pid  2 memory         state=TERMINATED  exit=0 cpu_ticks=10
pid  3 sleeper        state=TERMINATED  exit=0 cpu_ticks=4
pid  4 producer       state=TERMINATED  exit=0 cpu_ticks=11
pid  5 consumer       state=TERMINATED  exit=0 cpu_ticks=13
pid  6 forker         state=TERMINATED  exit=0 cpu_ticks=5
pid  7 forker-child   state=TERMINATED  exit=0 cpu_ticks=9
physical frames free: 64/64`;

    const totalTicks = 61;
    const processByPid = new Map(processRows.map((row) => [row.pid, row]));
    const modeGrid = document.querySelector("#modeGrid");
    const summaryRows = document.querySelector("#summaryRows");
    const raw = document.querySelector("#rawOutput");

    function renderSummary() {
      const maxCpu = Math.max(...processRows.map((row) => row.cpu));
      summaryRows.innerHTML = processRows.map((row) => `
        <tr>
          <td class="pid">${row.pid}</td>
          <td><span class="legend-item"><span class="dot ${row.cls}"></span>${row.name}</span></td>
          <td><span class="status">${row.state}</span></td>
          <td>${row.exit}</td>
          <td class="cpu-cell">
            ${row.cpu}
            <div class="cpu-bar"><div class="cpu-fill" style="width:${(row.cpu / maxCpu) * 100}%"></div></div>
          </td>
        </tr>
      `).join("");
    }

    function segmentDispatches(dispatches) {
      return dispatches.map((entry, index) => {
        const [start, pid] = entry;
        const next = dispatches[index + 1]?.[0] ?? totalTicks;
        return { start, end: next, pid };
      });
    }

    function renderTimeline(run) {
      const segments = segmentDispatches(run.dispatches);
      const lanes = processRows.map((row) => {
        const bars = segments
          .filter((segment) => segment.pid === row.pid)
          .map((segment) => {
            const left = (segment.start / totalTicks) * 100;
            const width = ((segment.end - segment.start) / totalTicks) * 100;
            return `<span class="bar ${row.cls}" title="${row.name}: tick ${segment.start}-${segment.end}" style="left:${left}%;width:${width}%"></span>`;
          })
          .join("");
        return `<div class="lane"><span class="lane-label">${row.name}</span>${bars}</div>`;
      }).join("");

      const axis = [0, 10, 20, 30, 40, 50, 61]
        .map((tick) => `<span style="left:${(tick / totalTicks) * 100}%">${tick}</span>`)
        .join("");

      return `<div class="timeline">${lanes}<div class="axis">${axis}</div></div>`;
    }

    function renderEvents(run) {
      return `<div class="events">${
        run.events.map(([tick, name, text]) => `
          <article class="event">
            <div class="tick">${tick}</div>
            <div>
              <strong>${name}</strong>
              <p>${text}</p>
            </div>
          </article>
        `).join("")
      }</div>`;
    }

    function renderRun(key, run) {
      const legend = processRows.map((row) => `
        <span class="legend-item"><span class="dot ${row.cls}"></span>${row.name}</span>
      `).join("");

      return `
        <article class="mode-panel" data-panel="${key}">
          <div class="mode-head">
            <div>
              <h2 class="mode-title">${run.title}</h2>
              <div class="subtitle">${run.subtitle}</div>
            </div>
            <span class="badge">exit 0</span>
          </div>
          <div class="mode-body">
            <div class="section-title">CPU 时间线 <span>0 到 61 ticks</span></div>
            ${renderTimeline(run)}
            <div class="legend">${legend}</div>
            <div class="section-title">关键事件 <span>${run.events.length} 条</span></div>
            ${renderEvents(run)}
          </div>
        </article>
      `;
    }

    function setView(view) {
      document.querySelectorAll(".segmented button").forEach((button) => {
        button.classList.toggle("active", button.dataset.view === view);
      });
      document.querySelectorAll(".mode-panel").forEach((panel) => {
        const show = view === "both" || panel.dataset.panel === view;
        panel.hidden = !show;
      });
      modeGrid.style.gridTemplateColumns = view === "both" ? "" : "minmax(0, 1fr)";
    }

    modeGrid.innerHTML = renderRun("roundrobin", runs.roundrobin) + renderRun("priority", runs.priority);
    renderSummary();
    raw.textContent = rawOutput;

    document.querySelectorAll(".segmented button").forEach((button) => {
      button.addEventListener("click", () => setView(button.dataset.view));
    });
  </script>
</body>
</html>
