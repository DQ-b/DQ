<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>下载记录</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f6fa;
      color: #333;
      padding: 32px 16px;
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 20px;
      color: #111;
    }

    .record-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 680px;
    }

    .record-card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
    }

    .record-main {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
    }

    .record-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .record-name {
      font-size: 15px;
      font-weight: 500;
    }

    .record-meta {
      font-size: 12px;
      color: #888;
    }

    .files-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: #f0f4ff;
      color: #3b5bdb;
      border: 1px solid #c5d0ff;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background .15s, border-color .15s;
      white-space: nowrap;
    }

    .files-toggle:hover {
      background: #e0e9ff;
      border-color: #7c98ff;
    }

    .files-toggle .arrow {
      display: inline-block;
      font-size: 10px;
      transition: transform .2s;
    }

    .files-toggle.open .arrow {
      transform: rotate(180deg);
    }

    .files-panel {
      display: none;
      border-top: 1px solid #e5e7eb;
      background: #fafbff;
    }

    .files-panel.open {
      display: block;
    }

    .file-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 18px;
      font-size: 13px;
      border-bottom: 1px solid #f0f1f5;
    }

    .file-item:last-child { border-bottom: none; }

    .file-icon {
      font-size: 16px;
      width: 20px;
      text-align: center;
      flex-shrink: 0;
    }

    .file-name {
      flex: 1;
      color: #222;
    }

    .file-size {
      color: #aaa;
      font-size: 12px;
    }
  </style>
</head>
<body>

<h1>下载记录</h1>

<div class="record-list" id="recordList"></div>

<script>
  const records = [
    {
      name: "2024年第三季度财务报告",
      date: "2025-06-03 14:22",
      files: [
        { name: "财务摘要.pdf", size: "1.2 MB", icon: "📄" },
        { name: "详细数据.xlsx", size: "3.8 MB", icon: "📊" },
        { name: "附件说明.docx", size: "256 KB", icon: "📝" },
      ]
    },
    {
      name: "产品设计资源包",
      date: "2025-06-02 09:47",
      files: [
        { name: "UI组件.sketch", size: "12.4 MB", icon: "🎨" },
        { name: "图标集.zip", size: "4.1 MB", icon: "🗜️" },
        { name: "字体文件.zip", size: "2.0 MB", icon: "🗜️" },
      ]
    },
    {
      name: "技术文档合集",
      date: "2025-06-01 16:05",
      files: [
        { name: "API参考手册.pdf", size: "5.6 MB", icon: "📄" },
        { name: "架构图.png", size: "890 KB", icon: "🖼️" },
        { name: "变更日志.md", size: "48 KB", icon: "📝" },
      ]
    }
  ];

  const list = document.getElementById('recordList');

  records.forEach((record, index) => {
    const card = document.createElement('div');
    card.className = 'record-card';

    const fileCount = record.files.length;

    const filesHTML = record.files.map(f => `
      <div class="file-item">
        <span class="file-icon">${f.icon}</span>
        <span class="file-name">${f.name}</span>
        <span class="file-size">${f.size}</span>
      </div>
    `).join('');

    card.innerHTML = `
      <div class="record-main">
        <div class="record-info">
          <span class="record-name">${record.name}</span>
          <span class="record-meta">${record.date}</span>
        </div>
        <button class="files-toggle" data-index="${index}">
          Files (${fileCount}) <span class="arrow">▼</span>
        </button>
      </div>
      <div class="files-panel" id="panel-${index}">
        ${filesHTML}
      </div>
    `;

    list.appendChild(card);
  });

  document.getElementById('recordList').addEventListener('click', e => {
    const btn = e.target.closest('.files-toggle');
    if (!btn) return;
    const idx = btn.dataset.index;
    const panel = document.getElementById(`panel-${idx}`);
    const isOpen = panel.classList.toggle('open');
    btn.classList.toggle('open', isOpen);
  });
</script>

</body>
</html>
